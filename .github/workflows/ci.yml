name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"   # CodeQL weekly
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish to PyPI, e.g. v1.1.0. Skips release-please."
        required: true
        type: string

permissions:
  contents: read

jobs:
  lint:
    if: github.event_name != 'schedule'
    uses: roquerodrigo/.github/.github/workflows/sdk-lint.yml@v2

  tests:
    if: github.event_name != 'schedule'
    needs: lint
    uses: roquerodrigo/.github/.github/workflows/sdk-tests.yml@v2

  codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: roquerodrigo/.github/.github/workflows/sdk-codeql.yml@v2

  release:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    needs: [lint, tests]
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: roquerodrigo/.github/.github/workflows/sdk-release.yml@v2
    with:
      pypi-package: tplink-deco-api
      dispatch-tag: ${{ inputs.tag || '' }}
    secrets: inherit
