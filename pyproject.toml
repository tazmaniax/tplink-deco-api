[project]
name = "tplink-deco-api"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "cryptography>=47.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tplink_deco"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
